name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: make tidy
        run: make tidy

      - name: make vet
        run: make vet

      - name: make build
        run: make build

      - name: make test
        run: make test

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for web/package.json
        id: check
        run: |
          if [ -f web/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.check.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        if: steps.check.outputs.present == 'true'
        working-directory: web
        run: npm ci

      - name: npm run build
        if: steps.check.outputs.present == 'true'
        working-directory: web
        run: npm run build
