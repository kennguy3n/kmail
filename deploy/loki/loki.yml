# KMail — Loki configuration.
#
# Single-binary Loki suitable for the local compose stack and for
# small staging deployments. Production runs on a managed Loki
# (Grafana Cloud or a self-hosted multi-node cluster); the
# Promtail config in `deploy/promtail/promtail.yml` ships logs to
# whichever Loki address `LOKI_URL` is pointing at.
#
# Storage backend: filesystem under /tmp/loki. The compose stack
# binds a named volume `loki_data` so the data survives container
# restarts. Replace the `boltdb-shipper` + `filesystem` pair with
# a real chunk + index store before promoting beyond staging.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095

common:
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

# Phase 7 — limits matched to the bench harness's worst-case
# burst (1k req/s for 2 minutes). Operators promoting Loki past
# the staging tier should re-tune these against their own ingest
# rate; the values below are intentionally conservative.
limits_config:
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  max_query_length: 720h
  max_streams_per_user: 5000
  reject_old_samples: true
  reject_old_samples_max_age: 168h

analytics:
  reporting_enabled: false
