apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kmail.fullname" . }}-api
  labels:
    {{- include "kmail.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.kmailApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "kmail.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "kmail.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "kmail.serviceAccountName" . }}
      containers:
        - name: kmail-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "kmail.fullname" . }}-config
            - secretRef:
                name: {{ include "kmail.secretName" . }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.kmailApi.resources | nindent 12 }}
