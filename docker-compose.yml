# KMail — local development stack.
#
# Brings up the infrastructure dependencies KMail's Go control plane
# and Stalwart rely on:
#
#   - PostgreSQL 16   — control-plane metadata (tenants, users,
#                       domains, aliases, shared inboxes, quotas,
#                       audit log, calendar metadata).
#   - Meilisearch     — Phase 2 search tier.
#   - Valkey          — short-TTL state / cache.
#   - zk-object-fabric — the real multi-tenant S3 gateway KMail ships
#                       with in production. Replaces the earlier MinIO
#                       stand-in; Stalwart v0.16.0 now talks S3
#                       directly to the gateway. The demo image is
#                       built from the sibling kennguy3n/zk-object-fabric
#                       repo (see its `Dockerfile` and `demo/`).
#
# Stalwart is wired as the `stalwart` service below, pinned to
# `stalwartlabs/mail-server:v0.16.0` and depending on the shared
# Postgres / zk-fabric / Valkey / Meilisearch instances above. The
# config at `configs/stalwart.toml` is mounted into the container so
# Stalwart picks up the local dev backends (Postgres / zk-fabric /
# Valkey / Meilisearch). See docs/PROPOSAL.md §1 for the Stalwart
# version pin and the staging upgrade plan, and
# `configs/stalwart.example.toml` for the production-shaped template.
#
# zk-fabric is published on host ports 9080 (S3 API) and 9081
# (console API) to avoid collision with the Go BFF (`kmail-api`) on
# host 8080.

services:
  postgres:
    image: postgres:16
    container_name: kmail-postgres
    environment:
      POSTGRES_USER: kmail
      POSTGRES_PASSWORD: kmail
      POSTGRES_DB: kmail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmail -d kmail"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: kmail-meilisearch
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: kmail-dev
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  valkey:
    image: valkey/valkey:8
    container_name: kmail-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  # zk-object-fabric is the S3-compatible multi-tenant storage
  # gateway KMail ships with in production. The `context` path
  # points at a sibling checkout of kennguy3n/zk-object-fabric; the
  # demo Dockerfile there builds a minimal gateway running the
  # `local_fs_dev` provider and a pre-loaded `kmail-dev` tenant.
  # Override with `image: ghcr.io/kennguy3n/zk-object-fabric:dev`
  # once the registry publishes a pinned tag.
  zk-fabric:
    build:
      context: ../zk-object-fabric
    container_name: kmail-zk-fabric
    ports:
      - "9080:8080"   # S3 API
      - "9081:8081"   # Console API
    volumes:
      - zk_data:/data/objects
    # Use a TCP probe rather than an HTTP GET — the S3 endpoint on
    # :8080 returns 403 AccessDenied to unauthenticated requests,
    # which `wget --spider` treats as failure. `nc -z` only checks
    # that the listener is accepting connections, which is what we
    # actually care about for compose's depends_on gate.
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # One-shot init container that waits for zk-fabric to be healthy,
  # then creates the `kmail-blobs` bucket Stalwart writes into. This
  # is idempotent — CreateBucket on an existing bucket is a no-op in
  # the gateway — so rerunning `docker compose up` is safe.
  zk-fabric-init:
    image: amazon/aws-cli:2.17.0
    container_name: kmail-zk-fabric-init
    depends_on:
      zk-fabric:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: kmail-access-key
      AWS_SECRET_ACCESS_KEY: kmail-secret-key
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - aws --endpoint-url http://zk-fabric:8080 s3 mb s3://kmail-blobs
    restart: "no"

  stalwart:
    image: stalwartlabs/mail-server:v0.16.0
    container_name: kmail-stalwart
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      zk-fabric:
        condition: service_healthy
      zk-fabric-init:
        condition: service_completed_successfully
      meilisearch:
        condition: service_started
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "143:143"
      - "993:993"
      # Host port 18080 avoids collision with the Go BFF (`kmail-api`),
      # which is expected to bind host 8080 during local development
      # (see web/vite.config.ts). The BFF proxies JMAP to Stalwart
      # over the compose network.
      - "18080:8080"
    environment:
      STALWART_ADMIN_PASSWORD: kmail-dev
    volumes:
      - stalwart_data:/opt/stalwart-mail
      - ./configs/stalwart.toml:/opt/stalwart-mail/etc/config.toml:ro

volumes:
  postgres_data:
  meilisearch_data:
  valkey_data:
  zk_data:
  stalwart_data:
