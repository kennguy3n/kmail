# KMail — local development stack.
#
# Brings up the infrastructure dependencies KMail's Go control plane
# and Stalwart rely on:
#
#   - PostgreSQL 16   — control-plane metadata (tenants, users,
#                       domains, aliases, shared inboxes, quotas,
#                       audit log, calendar metadata).
#   - Meilisearch     — Phase 2 search tier.
#   - Valkey          — short-TTL state / cache.
#   - zk-object-fabric — the real multi-tenant S3 gateway KMail ships
#                       with in production. Replaces the earlier MinIO
#                       stand-in; Stalwart v0.16.0 now talks S3
#                       directly to the gateway. The demo image is
#                       built from the sibling kennguy3n/zk-object-fabric
#                       repo (see its `Dockerfile` and `demo/`).
#
# Stalwart is wired as the `stalwart` service below, pinned to
# `stalwartlabs/stalwart:v0.16.0` (the upstream image was renamed
# from `stalwartlabs/mail-server` in this release) and depending
# on the shared Postgres / zk-fabric / Valkey / Meilisearch
# instances above. v0.16.0 stores all runtime settings (listeners,
# blob store, directories, domains, DKIM keys, …) in a data store;
# `configs/stalwart/config.json` is a minimal JSON bootstrap that
# points Stalwart at the dedicated `stalwart` Postgres database
# created by `scripts/postgres-init-stalwart.sql`. On first boot
# Stalwart connects to Postgres, sees no `Bootstrap` object, and
# opens its setup wizard on host port 18080 with the pinned admin
# credentials below. `docs/DEVELOPMENT.md` documents the ~5 setup
# screens (domain, admin, blob store, listeners) that wire
# Stalwart to the zk-fabric S3 gateway; the resulting state is
# persisted in the `postgres_data` volume, so subsequent `docker
# compose up` runs boot straight into a configured server. See
# docs/PROPOSAL.md §1 for the Stalwart version pin and the
# staging upgrade plan; the legacy `configs/stalwart.toml` is kept
# around as a reference for what a future automated seed should
# write into Postgres.
#
# zk-fabric is published on host ports 9080 (S3 API) and 9081
# (console API) to avoid collision with the Go BFF (`kmail-api`) on
# host 8080.

services:
  postgres:
    image: postgres:16
    container_name: kmail-postgres
    environment:
      POSTGRES_USER: kmail
      POSTGRES_PASSWORD: kmail
      POSTGRES_DB: kmail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Creates the dedicated `stalwart` database + role used by
      # Stalwart's v0.16.0 data store. Runs once on a fresh volume.
      - ./scripts/postgres-init-stalwart.sql:/docker-entrypoint-initdb.d/10-stalwart.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmail -d kmail"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: kmail-meilisearch
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: kmail-dev
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  valkey:
    image: valkey/valkey:8
    container_name: kmail-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  # zk-object-fabric is the S3-compatible multi-tenant storage
  # gateway KMail ships with in production. The `context` path
  # points at a sibling checkout of kennguy3n/zk-object-fabric; the
  # demo Dockerfile there builds a minimal gateway running the
  # `local_fs_dev` provider and a pre-loaded `kmail-dev` tenant.
  # Override with `image: ghcr.io/kennguy3n/zk-object-fabric:dev`
  # once the registry publishes a pinned tag.
  zk-fabric:
    build:
      context: ../zk-object-fabric
    container_name: kmail-zk-fabric
    ports:
      - "9080:8080"   # S3 API
      - "9081:8081"   # Console API
    volumes:
      - zk_data:/data/objects
    # Use a TCP probe rather than an HTTP GET — the S3 endpoint on
    # :8080 returns 403 AccessDenied to unauthenticated requests,
    # which `wget --spider` treats as failure. `nc -z` only checks
    # that the listener is accepting connections, which is what we
    # actually care about for compose's depends_on gate.
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # One-shot init container that waits for zk-fabric to be healthy,
  # then creates the `kmail-blobs` bucket Stalwart writes into. This
  # is idempotent — CreateBucket on an existing bucket is a no-op in
  # the gateway — so rerunning `docker compose up` is safe.
  zk-fabric-init:
    image: amazon/aws-cli:2.17.0
    container_name: kmail-zk-fabric-init
    depends_on:
      zk-fabric:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: kmail-access-key
      AWS_SECRET_ACCESS_KEY: kmail-secret-key
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - aws --endpoint-url http://zk-fabric:8080 s3 mb s3://kmail-blobs
    restart: "no"

  stalwart:
    # v0.16.0 renamed the upstream image from
    # `stalwartlabs/mail-server` to `stalwartlabs/stalwart` and
    # split the configuration in two:
    #
    #   1. `/etc/stalwart/config.json` is a tiny JSON file that only
    #      tells Stalwart which data store to use. `configs/stalwart/
    #      config.json` is mounted there and points at the dedicated
    #      `stalwart` Postgres database provisioned by
    #      `scripts/postgres-init-stalwart.sql`.
    #   2. Every other setting (listeners, blob store, directories,
    #      domains, DKIM keys, …) lives inside the data store and
    #      is written by Stalwart's first-boot setup wizard, served
    #      from the `http-recovery` listener on container port 8080
    #      (host port 18080).
    #
    # `STALWART_RECOVERY_ADMIN` pins the bootstrap administrator to
    # a deterministic value so the setup wizard is reproducible
    # across rebuilds; without it the container prints a random
    # password on every start. See `docs/DEVELOPMENT.md` for the
    # one-time walkthrough that wires the zk-fabric S3 blob store
    # and the mail listeners into the data store.
    image: stalwartlabs/stalwart:v0.16.0
    container_name: kmail-stalwart
    # Force the container's internal hostname to `localhost` so the
    # URL Stalwart generates for its own OIDC/OAuth issuer + the
    # authorization endpoint (see `HttpContext::resolve_response_url`
    # in v0.16.0) is browser-reachable from the host. Without this,
    # `/.well-known/openid-configuration` advertises
    # `http://<container-id>:8080` as the issuer and the admin SPA
    # redirects browsers to an unresolvable URL.
    hostname: localhost
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      zk-fabric:
        condition: service_healthy
      zk-fabric-init:
        condition: service_completed_successfully
      meilisearch:
        condition: service_started
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "143:143"
      - "993:993"
      # Host port 8080 matches the container port so Stalwart's
      # self-advertised OIDC issuer URL (`http://localhost:8080`,
      # built from the `hostname: localhost` + container-side
      # listener port by `HttpContext::resolve_response_url` in
      # v0.16.0) is directly reachable from a host browser. The Go
      # BFF (`kmail-api`) historically binds host 8080 during local
      # development — when running both concurrently, start the BFF
      # with `--addr=127.0.0.1:8088` and update `web/vite.config.ts`
      # to proxy `/jmap` there instead.
      - "8080:8080"
    environment:
      # Deterministic recovery admin — lets you log into the setup
      # wizard after `docker compose up` with `admin / kmail-dev`.
      # Not a real credential; rotate before exposing this stack
      # anywhere off localhost. Once the wizard has provisioned a
      # permanent administrator Stalwart ignores this variable.
      STALWART_RECOVERY_ADMIN: "admin:kmail-dev"
    volumes:
      # JSON bootstrap → points Stalwart at its `stalwart`
      # Postgres database. The rest of its settings live in that
      # database after the setup wizard runs.
      - ./configs/stalwart/config.json:/etc/stalwart/config.json:ro
      # Persistent store for the downloaded web UI bundle, ACME
      # state, any DKIM keys Stalwart generates locally, etc.
      - stalwart_data:/opt/stalwart

volumes:
  postgres_data:
  meilisearch_data:
  valkey_data:
  zk_data:
  stalwart_data:
